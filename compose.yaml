services:
  app:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://mmiplace:mmiplace@db:5432/mmiplace"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mmiplace
      POSTGRES_PASSWORD: mmiplace
      POSTGRES_DB: mmiplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmiplace"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # One-shot: push schema + seed data on first run
  setup:
    build:
      context: .
      target: builder
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://mmiplace:mmiplace@db:5432/mmiplace"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts"
    restart: "no"
    profiles:
      - setup

volumes:
  pgdata: